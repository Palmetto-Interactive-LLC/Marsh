name: "CodeQL PUBLIC-REPO-ONLY"

# PUBLIC-REPO-ONLY: CodeQL analysis uploads require public repositories or GitHub
# Advanced Security licensing. This workflow is intentionally not a required check
# for private GitHub Team template repositories.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 7 * * 2"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codeql-public-repo-only:
    name: "CodeQL PUBLIC-REPO-ONLY"
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm install
            npm run build --if-present
          else
            echo "No buildable package detected; CodeQL will analyze source directly."
          fi

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
