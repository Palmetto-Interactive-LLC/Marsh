name: Epic
description: Define a large body of related work.
title: "[Epic]: "
labels:
  - "type:epic"
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        **Type:** Epic. Internal delivery work is organized as a Linear project after triage.
        Use this when the work should break down into multiple child items.
  - type: dropdown
    id: item_type
    attributes:
      label: Item type
      description: Keep this aligned with the GitHub label.
      options:
        - Epic
    validations:
      required: true
  - type: checkboxes
    id: searched
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing GitHub issues and relevant Linear work before filing.
          required: true
  - type: textarea
    id: mission
    attributes:
      label: Mission
      description: What durable outcome should this epic produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
      value: |
        Included:
        -

        Excluded:
        -
    validations:
      required: true
  - type: textarea
    id: child_work
    attributes:
      label: Expected child work
      description: List likely features, issues, bugs, or spikes this epic will contain.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: success_criteria
    attributes:
      label: Success criteria
      description: What must be true before the epic can close?
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and dependencies
      description: Note known blockers, sequencing, rollout risks, or external dependencies.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, constraints, related Linear work, or GitHub issues.
    validations:
      required: false
