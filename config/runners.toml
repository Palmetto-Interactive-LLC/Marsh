# Marsh runner platform config. Consumed by the orchestrator and rendered into
# Terraform variables. One universal image; size classes are selected by label.

[github]
# ``organization`` is the historical selected-runner-group model. A personal
# profile instead sets scope = "repository", owner, repositories, and
# runner_group_id; see docs/FLEET-DEPLOYMENT.md. Do not mix the two contracts.
scope = "organization"
org = "YOUR-GITHUB-ORG"
# Every sandbox this orchestrator creates is labeled org=<this value, lowercased>, and
# reap() / orphan_sweep() only ever delete sandboxes carrying that same label. This makes
# it safe to run one orchestrator instance per org against a single shared Daytona
# account: an instance never deletes another org's warm or busy runners. Sandboxes
# created before this label existed (or by an out-of-band process) carry no org label
# and are ignored by scoped sweeps -- drain those manually once.
# Runner group the ephemeral runners join. Create it with Terraform and scope it
# to selected repositories.
# The orchestrator's poller pulls that repo list dynamically from this group at runtime
# (GET .../runner-groups/{id}/repositories, cached ~10min) — no repo list lives here, so
# onboarding a new repo into the group needs zero orchestrator change or restart.
runner_group = "marsh"
# Runtime auth is supplied with env vars: GH_APP_ID, GH_APP_INSTALLATION_ID,
# GH_APP_KEY_PATH. Keep the private key outside this repository.

[daytona]
api_base = "https://app.daytona.io/api"
target   = "us"
# Runtime auth is supplied with DAYTONA_API_KEY.

[cache]
# One volume mounted at /cache in every runner; the job-hooks (cache-restore/save.sh)
# key caches per-repo inside it as tarballs (mountpoint-s3 = whole-file writes only).
volume = "marsh-cache"

# Size classes. Daytona fixes resources at SNAPSHOT registration (verified: you
# cannot pass --cpu/--memory when creating from a snapshot), so each class maps to a
# pre-sized snapshot built from the same image. Tier-3 per-sandbox cap: 4/8/10.
# Aggregate pool (Tier-3): 250 vCPU / 500 GiB → ~125 concurrent default runners.
# min_idle is a floor kept warm at all times for instant pickup of the common
# single-job case; the poller reconciler scales beyond it on queued demand, up to
# `max` (a real, enforced burst ceiling — well under the 250 vCPU pool).
[[size_class]]
name       = "default"            # runs-on: [self-hosted, marsh]
labels     = ["self-hosted", "marsh"]
snapshot   = "marsh-runner-default-v1"
cpu        = 2
memory_gib = 4
disk_gib   = 10
min_idle   = 1                    # warm floor for instant pickup; poller scales up on demand
max        = 60                   # burst ceiling, enforced by the poller reconciler

[[size_class]]
name       = "large"              # runs-on: [self-hosted, marsh, large]
labels     = ["self-hosted", "marsh", "large"]
snapshot   = "marsh-runner-large-v1"
cpu        = 4
memory_gib = 8
disk_gib   = 10
min_idle   = 0                    # no floor -- poller spawns from zero on a queued large-label job
max        = 20

# Lifecycle
[lifecycle]
ephemeral            = true       # one job per runner, sandbox deleted after
auto_stop_minutes    = 120        # orphan safety net (minutes): if the orchestrator
                                  # crashes before tearing a cycle down, Daytona force-
                                  # stops the sandbox on its own instead of it running
                                  # (and billing) forever -- not "disabled" anymore
auto_delete_interval = 0          # delete immediately on stop
idle_refresh_secs    = 1800       # floor (min_idle) cycles: max time idle awaiting a
                                  # job before refreshing with a fresh JIT
demand_idle_secs     = 300        # poller-spawned demand cycles: much shorter idle
                                  # deadline so an overshoot spawn (job taken by the
                                  # warm runner, or cancelled) dies cheap
job_max_secs         = 3600       # hard ceiling per job, now actually enforced

# Poller (demand reconciler)
[poller]
interval_secs = 20                # how often the reconciler ticks: repo list -> queued
                                  # demand -> busy map -> spawn/no-spawn per size class
# Optional per-fleet GitHub REST start-to-start spacing. 0 preserves the
# historical behavior; 403/429 responses always impose a shared cooldown.
request_spacing_secs = 0

# Cache volumes (Terraform creates them; orchestrator mounts them at /cache/<mount>).
# FUSE, persistent, shared across all ephemeral runners.
[[volume]]
name = "marsh-cache-cargo"
mount = "cargo"
[[volume]]
name = "marsh-cache-sccache"
mount = "sccache"
[[volume]]
name = "marsh-cache-go"
mount = "go"
[[volume]]
name = "marsh-cache-node"
mount = "npm"
[[volume]]
name = "marsh-cache-pip"
mount = "pip"
[[volume]]
name = "marsh-cache-buildx"
mount = "buildx"
[[volume]]
name = "marsh-cache-toolcache"
mount = "toolcache"
